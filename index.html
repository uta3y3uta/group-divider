<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>グループ分けアプリ</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>グループ分け</h1>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="setup">初期設定</button>
    <button class="tab-btn" data-tab="random">ランダム</button>
    <button class="tab-btn" data-tab="manual">手動</button>
  </nav>
</header>

<main>
  <!-- ============ 初期設定 ============ -->
  <section id="setup" class="tab-panel active">
    <div class="card">
      <h2>メンバー登録</h2>
      <p class="hint">名前を1行ずつ入力してください。「性別」「タグ」は任意です。</p>

      <div class="member-add">
        <input type="text" id="member-name" placeholder="名前" />
        <select id="member-gender">
          <option value="">性別なし</option>
          <option value="M">男</option>
          <option value="F">女</option>
        </select>
        <input type="text" id="member-tag" placeholder="タグ（任意）" />
        <button id="add-member-btn" class="primary">追加</button>
      </div>

      <div class="bulk-add">
        <details>
          <summary>まとめて追加</summary>
          <textarea id="bulk-text" rows="6" placeholder="1行に1人&#10;例：&#10;田中,M&#10;佐藤,F&#10;鈴木"></textarea>
          <button id="bulk-add-btn">まとめて追加</button>
        </details>
      </div>

      <ul id="member-list" class="member-list"></ul>

      <div class="setup-actions">
        <button id="clear-members-btn" class="danger">全員削除</button>
        <span class="count">登録: <span id="member-count">0</span> 人</span>
      </div>
    </div>
  </section>

  <!-- ============ ランダム ============ -->
  <section id="random" class="tab-panel">
    <div class="card">
      <h2>ランダムで分ける</h2>

      <div class="row">
        <label>分け方</label>
        <div class="seg">
          <button class="seg-btn active" data-mode="by-groups">班数で指定</button>
          <button class="seg-btn" data-mode="by-size">1班の人数で指定</button>
        </div>
      </div>

      <div class="row" id="by-groups-row">
        <label>班の数</label>
        <input type="number" id="group-count" min="1" value="4" />
      </div>

      <div class="row hidden" id="by-size-row">
        <label>1班の人数</label>
        <input type="number" id="group-size" min="2" value="4" />
      </div>

      <div class="row">
        <label>条件</label>
        <div class="cond">
          <label><input type="checkbox" id="mix-gender"> 男女混合</label>
          <label><input type="checkbox" id="avoid-last"> 前回と違うメンバー</label>
        </div>
      </div>

      <div class="row">
        <button id="shuffle-btn" class="primary big">分ける</button>
      </div>

      <div id="random-result" class="groups-area"></div>
    </div>
  </section>

  <!-- ============ 手動 ============ -->
  <section id="manual" class="tab-panel">
    <div class="card">
      <h2>手動で分ける</h2>
      <p class="hint">名前カードをドラッグして班に入れてください。スマホは長押し→ドラッグ。</p>

      <div class="row">
        <label>班の数</label>
        <input type="number" id="manual-group-count" min="1" value="4" />
        <button id="manual-rebuild-btn">作り直す</button>
      </div>

      <div class="row">
        <button id="manual-reset-btn">未配置に戻す</button>
        <button id="manual-auto-fill-btn" class="primary">空いてる班に均等配置</button>
      </div>

      <h3 class="sub">未配置</h3>
      <div id="pool" class="pool dropzone" data-group="pool"></div>

      <h3 class="sub">班</h3>
      <div id="manual-groups" class="groups-area"></div>
    </div>
  </section>
</main>

<footer>
  <small>データはこのブラウザ内（LocalStorage）に保存されます。</small>
</footer>

<script src="js/storage.js"></script>
<script src="js/setup.js"></script>
<script src="js/random.js"></script>
<script src="js/manual.js"></script>
<script src="js/app.js"></script>
</body>
</html>
